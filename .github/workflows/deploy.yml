name: Deploy Jekyll to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Encrypt resources page
        run: |
          TMPDIR=$(mktemp -d)
          npx staticrypt _site/resources/index.html \
            -p "${{ secrets.RESOURCES_PASSWORD }}" \
            --short \
            -d "$TMPDIR" \
            -c false \
            --template-title "组内资源 — QCL" \
            --template-instructions "请输入课题组密码以访问内部资源" \
            --template-placeholder "请输入密码" \
            --template-button "登 录" \
            --template-error "密码错误，请重试" \
            --template-remember "记住密码" \
            --template-color-primary "#4adeaa" \
            --template-color-secondary "#080c10"
          cp "$TMPDIR/index.html" _site/resources/index.html
          rm -rf "$TMPDIR"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

{% if page.lang == "en" %}{% assign lp = "/en" %}{% else %}{% assign lp = "" %}{% endif %}

<a href="{{ lp }}/research/{{ item.id }}/" class="research-card">
  {% if item.image %}
  <div class="research-card-img">
    <picture>
      <source srcset="{{ item.image | append: '.webp' | relative_url }}" type="image/webp">
      <img src="{{ item.image | append: '.jpg' | relative_url }}" alt="{% if page.lang == 'en' %}{{ item.title_en }}{% else %}{{ item.title }}{% endif %}" loading="lazy">
    </picture>
  </div>
  {% endif %}
  <div class="research-card-body">
    <h4>{% if page.lang == "en" %}{{ item.title_en }}{% else %}{{ item.title }}{% endif %}</h4>
    <p>{% if page.lang == "en" %}{{ item.summary_en }}{% else %}{{ item.summary }}{% endif %}</p>
  </div>
</a>

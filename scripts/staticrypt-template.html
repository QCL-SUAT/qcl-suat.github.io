<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="pragma" content="no-cache" />
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            .staticrypt-html { height: 100%; }
            .staticrypt-body {
                height: 100%; margin: 0;
                background: /*[|template_color_secondary|]*/0;
                font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
                display: flex; align-items: center; justify-content: center;
                -webkit-font-smoothing: antialiased;
            }
            .staticrypt-box {
                background: #0c1218; border: 1px solid #1a2530;
                border-radius: 12px; padding: 48px 44px; width: 400px; text-align: center;
            }
            .staticrypt-icon { font-size: 48px; margin-bottom: 20px; }
            .staticrypt-title { font-size: 24px; font-weight: 700; color: #e0e8e4; margin-bottom: 8px; }
            .staticrypt-instructions { font-size: 14px; color: #6a7a72; margin-bottom: 32px; }
            .staticrypt-group { margin-bottom: 20px; text-align: left; }
            .staticrypt-label { font-size: 13px; color: #8a9a92; margin-bottom: 6px; display: block; }
            .staticrypt-input {
                width: 100%; padding: 12px 16px; background: #0a0e14;
                border: 1px solid #1a2530; border-radius: 6px;
                color: #d0ddd5; font-size: 15px; outline: none;
                transition: border-color 0.2s;
            }
            .staticrypt-input:focus { border-color: /*[|template_color_primary|]*/0; }
            .staticrypt-input::placeholder { color: #445; }
            .staticrypt-btn {
                width: 100%; padding: 14px;
                background: /*[|template_color_primary|]*/0;
                color: #080c10; font-size: 16px; font-weight: 600;
                border: none; border-radius: 6px; cursor: pointer;
                margin-top: 8px; transition: background 0.2s;
            }
            .staticrypt-btn:hover { filter: brightness(90%); }
            .staticrypt-error {
                display: none; margin-top: 16px; padding: 10px;
                background: #1a1014; border: 1px solid #3a1a2a; border-radius: 6px;
                color: #e06060; font-size: 13px;
            }
            .staticrypt-error.show { display: block; }
            .staticrypt-note { margin-top: 20px; font-size: 12px; color: #445; }
            label.staticrypt-remember {
                display: flex; align-items: center; margin-bottom: 1em;
                font-size: 13px; color: #6a7a72;
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3); margin-right: 8px;
            }
            .hidden { display: none !important; }
            .staticrypt-spinner-container {
                height: 100%; display: flex; align-items: center; justify-content: center;
            }
            .staticrypt-spinner {
                display: inline-block; width: 2rem; height: 2rem;
                border: 0.25em solid #4adeaa; border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border { 100% { transform: rotate(360deg); } }
        </style>
    </head>
    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="hidden">
            <div class="staticrypt-box">
                <div class="staticrypt-icon">🔐</div>
                <div class="staticrypt-title">/*[|template_title|]*/0</div>
                <p class="staticrypt-instructions">/*[|template_instructions|]*/0</p>

                <form id="staticrypt-form" action="#" method="post">
                    <div class="staticrypt-group">
                        <label class="staticrypt-label">用户名</label>
                        <input type="text" class="staticrypt-input" id="staticrypt-username"
                               placeholder="请输入用户名" autocomplete="username" />
                    </div>
                    <div class="staticrypt-group">
                        <label class="staticrypt-label">密码</label>
                        <input type="password" class="staticrypt-input" id="staticrypt-password"
                               placeholder="/*[|template_placeholder|]*/0" autocomplete="current-password" />
                    </div>

                    <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
                        <input id="staticrypt-remember" type="checkbox" name="remember" />
                        /*[|template_remember|]*/0
                    </label>

                    <input type="submit" class="staticrypt-btn" value="/*[|template_button|]*/0" />
                </form>

                <div class="staticrypt-error" id="staticrypt-error">/*[|template_error|]*/0</div>
                <p class="staticrypt-note">仅限课题组成员访问</p>
            </div>
        </div>

        <script>
            const staticryptInitiator = /*[|js_staticrypt|]*/0;
            const templateError = "/*[|template_error|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/0,
                staticryptConfig = /*[|staticrypt_config|]*/0;

            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-username").focus();
                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }
                }
            };

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();
                var username = document.getElementById("staticrypt-username").value.trim();
                var password = document.getElementById("staticrypt-password").value;
                var errorEl = document.getElementById("staticrypt-error");

                if (!username || !password) {
                    errorEl.classList.add("show");
                    return;
                }

                // 拼接 username:password 作为解密密钥
                var combinedKey = username + ":" + password;
                var isRememberChecked = document.getElementById("staticrypt-remember").checked;

                var { isSuccessful } = await staticrypt.handleDecryptionOfPage(combinedKey, isRememberChecked);
                if (!isSuccessful) {
                    errorEl.classList.add("show");
                }
            });
        </script>
    </body>
</html>
